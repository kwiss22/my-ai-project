<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>K-Dating Chat - 한국어 배우기</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --kakao-yellow: #FEE500;
            --kakao-brown: #3C1E1E;
            --bg-gray: #B2C7D9;
            --bubble-me: #FEE500;
            --bubble-other: #FFFFFF;
            --text-dark: #000000;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Malgun Gothic', sans-serif;
            background: var(--bg-gray);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 16px 0;
        }

        /* 캐릭터 선택 화면 */
        .character-selection {
            background: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            text-align: center;
            max-width: 500px;
        }

        .character-selection h1 {
            font-size: 28px;
            margin-bottom: 10px;
            color: var(--kakao-brown);
        }

        .character-selection p {
            color: #666;
            margin-bottom: 30px;
        }

        .character-cards {
            display: flex;
            gap: 20px;
            justify-content: center;
        }

        .character-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 15px;
            padding: 30px 20px;
            cursor: pointer;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            color: white;
            width: 200px;
        }

        .character-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 30px rgba(0,0,0,0.3);
        }

        .character-card.jiwoo {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
        }

        .character-card.hyunwoo {
            background: linear-gradient(135deg, #12c2e9 0%, #c471ed 50%, #f64f59 100%);
        }

        .character-avatar {
            font-size: 80px;
            margin-bottom: 15px;
        }

        .character-avatar img {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            object-fit: cover;
        }

        .character-name {
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 5px;
        }

        .character-info {
            font-size: 14px;
            opacity: 0.9;
        }

        /* 채팅 화면 */
        .chat-container {
            display: none;
            width: 100%;
            max-width: 500px;
            height: 90vh;
            background: white;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            flex-direction: column;
            overflow: hidden;
        }

        .chat-container.active {
            display: flex;
        }

        /* 헤더 (카톡 스타일) */
        .chat-header {
            background: var(--kakao-brown);
            color: white;
            padding: 15px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .header-avatar {
            font-size: 32px;
        }

        .header-avatar img {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            object-fit: cover;
        }

        .header-info h2 {
            font-size: 16px;
            font-weight: 600;
        }

        .header-info p {
            font-size: 12px;
            opacity: 0.8;
        }

        .header-buttons {
            display: flex;
            gap: 10px;
        }

        .header-btn {
            background: rgba(255,255,255,0.2);
            border: none;
            color: white;
            padding: 8px 12px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 12px;
        }

        .header-btn:hover {
            background: rgba(255,255,255,0.3);
        }

        /* 메시지 영역 (카톡 스타일) */
        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            background: var(--bg-gray);
        }

        .message {
            display: flex;
            margin-bottom: 15px;
            animation: slideUp 0.3s ease;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message.user {
            flex-direction: row-reverse;
        }

        .message-content {
            max-width: 70%;
            padding: 12px 16px;
            border-radius: 18px;
            position: relative;
        }

        .message.ai .message-content {
            background: var(--bubble-other);
            color: var(--text-dark);
            border-top-left-radius: 5px;
        }

        .message.user .message-content {
            background: var(--bubble-me);
            color: var(--text-dark);
            border-top-right-radius: 5px;
        }

        .message-time {
            font-size: 10px;
            color: #666;
            margin-top: 5px;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        /* 채팅 내 클릭 링크 (커피 버튼 등) */
        .chat-link {
            display: inline-block;
            margin-top: 10px;
            padding: 8px 16px;
            background: linear-gradient(135deg, #ff9a56, #ff6b6b);
            color: #fff !important;
            text-decoration: none;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 600;
            transition: opacity 0.2s;
        }
        .chat-link:hover {
            opacity: 0.85;
        }

        /* 번역 버튼 */
        .translate-btn {
            background: none;
            border: none;
            color: #667eea;
            font-size: 11px;
            cursor: pointer;
            margin-top: 5px;
            padding: 0;
        }

        .translate-btn:hover {
            text-decoration: underline;
        }

        .translation {
            margin-top: 8px;
            padding: 8px;
            background: rgba(102, 126, 234, 0.1);
            border-radius: 8px;
            font-size: 13px;
            color: #555;
            border-left: 3px solid #667eea;
        }

        /* 입력 영역 */
        .input-area {
            background: white;
            padding: 15px;
            border-top: 1px solid #ddd;
            display: flex;
            gap: 10px;
        }

        .input-area input {
            flex: 1;
            padding: 12px 15px;
            border: 1px solid #ddd;
            border-radius: 20px;
            font-size: 14px;
            outline: none;
        }

        .input-area input:focus {
            border-color: var(--kakao-yellow);
        }

        .send-btn {
            background: var(--kakao-yellow);
            border: none;
            padding: 12px 20px;
            border-radius: 20px;
            cursor: pointer;
            font-weight: bold;
            transition: transform 0.2s;
        }

        .send-btn:hover {
            transform: scale(1.05);
        }

        .send-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* Typing indicator */
        .typing-indicator {
            display: none;
            align-items: center;
            gap: 5px;
            padding: 12px 16px;
            background: white;
            border-radius: 18px;
            width: fit-content;
        }

        .typing-indicator.active {
            display: flex;
        }

        .typing-dot {
            width: 8px;
            height: 8px;
            background: #999;
            border-radius: 50%;
            animation: typing 1.4s infinite;
        }

        .typing-dot:nth-child(2) {
            animation-delay: 0.2s;
        }

        .typing-dot:nth-child(3) {
            animation-delay: 0.4s;
        }

        @keyframes typing {
            0%, 60%, 100% {
                transform: translateY(0);
            }
            30% {
                transform: translateY(-10px);
            }
        }

        /* Mobile responsive tweaks */
        @media (max-width: 600px) {
            body {
                align-items: stretch;
            }

            .character-selection {
                width: 100%;
                margin: 0 12px;
                padding: 24px 18px 32px;
            }

            .character-cards {
                flex-direction: column;
                gap: 14px;
            }

            .character-card {
                width: 100%;
                padding: 22px 16px;
            }

            .chat-container {
                max-width: 100%;
                width: 100%;
                height: 100vh;
                border-radius: 0;
            }

            .chat-header {
                padding: 12px 16px;
            }

            .header-info h2 {
                font-size: 15px;
            }

            .header-info p {
                font-size: 11px;
            }

            .messages {
                padding: 16px;
                padding-bottom: 220px;
            }

            .input-area {
                padding: 12px;
                gap: 8px;
            }

            .input-area input {
                font-size: 16px;
            }

            .send-btn {
                padding: 12px 16px;
            }
        }

        /* Buy Me a Coffee floating button */
        .bmc-floating {
            position: fixed;
            right: 16px;
            bottom: 24px;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 6px;
            pointer-events: none;
        }

        .bmc-tooltip {
            background: #fff7cc;
            color: #3c1e1e;
            font-size: 12px;
            padding: 6px 10px;
            border-radius: 12px;
            box-shadow: 0 6px 16px rgba(0,0,0,0.12);
            border: 1px solid #f6d365;
            pointer-events: auto;
        }

        .bmc-button {
            pointer-events: auto;
        }

        .bmc-button img {
            width: 170px;
            max-width: 44vw;
            height: auto;
            display: block;
        }

        .bmc-floating.hidden {
            opacity: 0;
            pointer-events: none;
            transform: translateY(8px);
            transition: opacity 0.2s ease, transform 0.2s ease;
        }

        @media (max-width: 600px) {
            .bmc-floating {
                bottom: 150px; /* keep clear of input area on mobile */
                right: 12px;
            }
            .bmc-button img {
                width: 130px;
            }
        }

        @media (max-width: 420px) {
            .messages {
                padding-bottom: 240px;
            }
            .bmc-tooltip {
                font-size: 11px;
                padding: 5px 8px;
            }
        }
    </style>
</head>
<body>
    <!-- 캐릭터 선택 화면 -->
    <div class="character-selection" id="character-selection">
        <h1>💕 K-Dating Chat</h1>
        <p>한국어를 배우면서 로맨틱한 대화를 나눠보세요!</p>

        <div class="character-cards">
            <div class="character-card jiwoo" onclick="selectCharacter('jiwoo')">
                <div class="character-avatar">
                    <img src="{{ url_for('static', filename='jiwoo_profile.png') }}" alt="지우">
                </div>
                <div class="character-name">지우</div>
                <div class="character-info">22세 · 이대 재학중</div>
            </div>

            <div class="character-card hyunwoo" onclick="selectCharacter('hyunwoo')">
                <div class="character-avatar">
                    <img src="{{ url_for('static', filename='hyunwoo_profile.png') }}" alt="현우">
                </div>
                <div class="character-name">현우</div>
                <div class="character-info">23세 · 홍대 재학중</div>
            </div>
        </div>
        <p style="margin-top: 28px; margin-bottom: 0; font-size: 13px; color: #555; line-height: 1.7; background: rgba(0,0,0,0.05); padding: 12px 16px; border-radius: 8px;">
            지우와 현우는 AI 캐릭터입니다. 모든 대화는 허구이며, 실제 만남은 이루어지지 않습니다.<br>
            Jiwoo and Hyunwoo are AI characters. All conversations are fictional role-play.
        </p>
    </div>

    <!-- 채팅 화면 -->
    <div class="chat-container" id="chat-container">
        <div class="chat-header">
            <div class="header-left">
                <div class="header-avatar" id="header-avatar">👨</div>
                <div class="header-info">
                    <h2 id="character-name">민준</h2>
                    <p>한국어로 대화해요</p>
                </div>
            </div>
            <div class="header-buttons">
                <button class="header-btn" onclick="changeCharacter()">캐릭터 변경</button>
            </div>
        </div>

        <div class="messages" id="messages"></div>

        <div class="input-area">
            <input
                type="text"
                id="user-input"
                placeholder="메시지를 입력하세요..."
                onkeypress="handleKeyPress(event)"
            >
            <button class="send-btn" id="send-btn" onclick="sendMessage()">전송</button>
        </div>
    </div>

    <div class="bmc-floating" aria-label="Buy Me a Coffee">
        <div class="bmc-tooltip">Buy Oppa a Coffee? ☕️</div>
        <a class="bmc-button" href="https://buymeacoffee.com/kdating" target="_blank" rel="noopener noreferrer">
            <img src="https://cdn.buymeacoffee.com/buttons/v2/default-yellow.png" alt="Buy Me a Coffee">
        </a>
    </div>

    <script>
        let currentCharacter = 'jiwoo';
        let sessionId = null;
        let requestController = null;
        let sessionToken = 0;

        // 캐릭터 선택
        async function selectCharacter(character) {
            currentCharacter = character;
            sessionToken += 1;
            if (requestController) {
                requestController.abort();
                requestController = null;
            }

            try {
                const response = await fetch('/select-character', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ character })
                });

                const data = await response.json();

                if (data.success) {
                    sessionId = data.session_id || null;
                    // UI 업데이트
                    const headerAvatar = document.getElementById('header-avatar');

                    if (character === 'hyunwoo') {
                        headerAvatar.innerHTML = '<img src="/static/hyunwoo_profile.png" alt="현우">';
                    } else if (character === 'jiwoo') {
                        headerAvatar.innerHTML = '<img src="/static/jiwoo_profile.png" alt="지우">';
                    } else {
                        headerAvatar.textContent = '👨';
                    }

                    document.getElementById('character-name').textContent = data.name;

                    // 화면 전환
                    document.getElementById('character-selection').style.display = 'none';
                    document.getElementById('chat-container').classList.add('active');
                    document.getElementById('messages').innerHTML = '';

                    // 환영 메시지
                    let welcomeMsg = '';
                    if (character === 'jiwoo') {
                        welcomeMsg = '안녕하세요! 저는 지우예요. 반가워요 💕';
                    } else if (character === 'hyunwoo') {
                        welcomeMsg = '야, 드디어 왔네? 😉 기다렸어. 나는 현우야';
                    }

                    addMessage(welcomeMsg, false);
                }
            } catch (error) {
                console.error('Character selection error:', error);
            }
        }

        // 캐릭터 변경
        function changeCharacter() {
            if (confirm('캐릭터를 변경하면 대화가 초기화됩니다. 계속하시겠어요?')) {
                sessionToken += 1;
                if (requestController) {
                    requestController.abort();
                    requestController = null;
                }
                document.getElementById('messages').innerHTML = '';
                document.getElementById('character-selection').style.display = 'block';
                document.getElementById('chat-container').classList.remove('active');
            }
        }

        // 메시지 전송
        async function sendMessage() {
            const input = document.getElementById('user-input');
            const message = input.value.trim();

            if (!message) return;

            // 내 메시지 표시
            addMessage(message, true);
            input.value = '';

            // Typing indicator 표시
            const typingIndicator = showTypingIndicator();

            try {
                const formData = new FormData();
                formData.append('message', message);

                const controller = new AbortController();
                requestController = controller;
                const tokenAtSend = sessionToken;
                const timeoutId = setTimeout(() => controller.abort(), 45000);

                const response = await fetch('/chat', {
                    method: 'POST',
                    body: formData,
                    signal: controller.signal
                });

                clearTimeout(timeoutId);

                let data = null;
                try {
                    data = await response.json();
                } catch (parseError) {
                    data = null;
                }

                if (tokenAtSend !== sessionToken) {
                    return;
                }

                if (!response.ok) {
                    const errorMsg = data && data.error ? data.error : '서버 응답에 문제가 있어요.';
                    throw new Error(errorMsg);
                }

                // Typing indicator 제거
                typingIndicator.remove();

                if (data.response) {
                    // 현우 캐릭터의 JSON 응답 처리
                    if (data.is_json && data.response_json) {
                        addMessageWithTranslation(
                            data.response_json.korean,
                            data.response_json.english,
                            data.response_json.emotion
                        );
                    } else {
                        // 민준/지우 캐릭터의 일반 응답
                        addMessage(data.response, false);
                    }
                }
            } catch (error) {
                typingIndicator.remove();
                console.error('Send message error:', error);
                if (error.name === 'AbortError') {
                    addMessage('응답이 지연되고 있어요. 잠시 후 다시 시도해주세요.', false);
                } else {
                    addMessage('죄송해요, 오류가 발생했어요. 다시 시도해주세요.', false);
                }
            } finally {
                requestController = null;
            }
        }

        // 입력 중 Buy Me a Coffee 버튼 숨김
        const userInput = document.getElementById('user-input');
        const bmcFloating = document.querySelector('.bmc-floating');
        if (userInput && bmcFloating) {
            userInput.addEventListener('focus', () => {
                bmcFloating.classList.add('hidden');
            });
            userInput.addEventListener('blur', () => {
                bmcFloating.classList.remove('hidden');
            });
        }

        // 메시지 추가 (현우 캐릭터용 - 영어 번역 포함)
        function addMessageWithTranslation(korean, english, emotion) {
            const messagesDiv = document.getElementById('messages');
            const messageDiv = document.createElement('div');
            messageDiv.className = 'message ai';

            const contentDiv = document.createElement('div');
            contentDiv.className = 'message-content';

            // 한국어 텍스트
            const koreanText = document.createElement('div');
            koreanText.textContent = korean;
            koreanText.style.fontWeight = 'bold';
            koreanText.style.marginBottom = '8px';
            contentDiv.appendChild(koreanText);

            // 영어 번역 (토글 가능)
            const translationDiv = document.createElement('div');
            translationDiv.className = 'translation';
            translationDiv.textContent = english;
            translationDiv.style.display = 'block'; // 항상 표시
            contentDiv.appendChild(translationDiv);

            const timeDiv = document.createElement('div');
            timeDiv.className = 'message-time';
            timeDiv.textContent = new Date().toLocaleTimeString('ko-KR', {
                hour: '2-digit',
                minute: '2-digit'
            });

            messageDiv.appendChild(contentDiv);
            messageDiv.appendChild(timeDiv);
            messagesDiv.appendChild(messageDiv);

            // 한국어 TTS 자동 재생
            speakKorean(korean);

            // 스크롤 하단으로
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }

        // 메시지 추가 (민준/지우 캐릭터용)
        // 마크다운 링크를 HTML로 변환 (XSS 방지 포함)
        function renderMarkdownLinks(text) {
            // 0) (속삭임) / (whisper) 태그 제거 (화면에 안 보이게)
            text = text.replace(/\(속삭임\)|\(whisper\)/gi, '').trim();
            // 1) HTML 특수문자 이스케이프 (XSS 방지)
            const escaped = text
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;');
            // 2) 마크다운 링크 [text](url) → <a> 태그로 변환
            return escaped.replace(
                /\[([^\]]+)\]\((https?:\/\/[^)]+)\)/g,
                '<a href="$2" target="_blank" class="chat-link">$1</a>'
            );
        }

        function addMessage(content, isUser) {
            const messagesDiv = document.getElementById('messages');
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${isUser ? 'user' : 'ai'}`;

            const contentDiv = document.createElement('div');
            contentDiv.className = 'message-content';

            if (!isUser) {
                // AI 메시지: 마크다운 링크를 클릭 가능한 HTML로 변환
                contentDiv.innerHTML = renderMarkdownLinks(content);
            } else {
                contentDiv.textContent = content;
            }

            // AI 메시지에 번역 버튼 추가
            if (!isUser) {
                const translateBtn = document.createElement('button');
                translateBtn.className = 'translate-btn';
                translateBtn.textContent = '🌐 English';
                // 번역에도 (속삭임) 태그 제거된 텍스트 전달
                const cleanContent = content.replace(/\(속삭임\)|\(whisper\)/gi, '').trim();
                translateBtn.onclick = () => translateMessage(contentDiv, cleanContent);
                contentDiv.appendChild(translateBtn);

                // 한국어 TTS 자동 재생 (원본 텍스트 전달 - 백엔드에서 처리)
                speakKorean(content);
            }

            const timeDiv = document.createElement('div');
            timeDiv.className = 'message-time';
            timeDiv.textContent = new Date().toLocaleTimeString('ko-KR', {
                hour: '2-digit',
                minute: '2-digit'
            });

            messageDiv.appendChild(contentDiv);
            messageDiv.appendChild(timeDiv);
            messagesDiv.appendChild(messageDiv);

            // 스크롤 하단으로
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }

        // 번역
        async function translateMessage(contentDiv, koreanText) {
            const existingTranslation = contentDiv.querySelector('.translation');
            if (existingTranslation) {
                existingTranslation.remove();
                return;
            }

            try {
                const response = await fetch('/translate', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ text: koreanText })
                });

                const data = await response.json();

                if (data.translatedText) {
                    const translationDiv = document.createElement('div');
                    translationDiv.className = 'translation';
                    translationDiv.textContent = data.translatedText;
                    contentDiv.appendChild(translationDiv);
                }
            } catch (error) {
                console.error('Translation error:', error);
            }
        }

        // 한국어 TTS
        async function speakKorean(text) {
            try {
                const response = await fetch('/tts', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        text: text,
                        language: 'ko-KR'
                    })
                });

                const data = await response.json();

                if (data.audio) {
                    const audioBytes = atob(data.audio);
                    const arrayBuffer = new ArrayBuffer(audioBytes.length);
                    const uint8Array = new Uint8Array(arrayBuffer);
                    for (let i = 0; i < audioBytes.length; i++) {
                        uint8Array[i] = audioBytes.charCodeAt(i);
                    }

                    const blob = new Blob([uint8Array], { type: 'audio/mp3' });
                    const audioUrl = URL.createObjectURL(blob);
                    const audio = new Audio(audioUrl);
                    audio.play();

                    audio.onended = () => {
                        URL.revokeObjectURL(audioUrl);
                    };
                }
            } catch (error) {
                console.error('TTS error:', error);
            }
        }

        // Typing indicator 표시
        function showTypingIndicator() {
            const messagesDiv = document.getElementById('messages');
            const messageDiv = document.createElement('div');
            messageDiv.className = 'message ai';

            const typingDiv = document.createElement('div');
            typingDiv.className = 'typing-indicator active';
            typingDiv.innerHTML = '<div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div>';

            messageDiv.appendChild(typingDiv);
            messagesDiv.appendChild(messageDiv);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;

            return messageDiv;
        }

        // Enter 키 처리
        function handleKeyPress(event) {
            if (event.key === 'Enter') {
                sendMessage();
            }
        }
    </script>
