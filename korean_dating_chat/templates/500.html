<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>잠시 문제가 생겼어요 · K-Dating Chat</title>
    <meta name="robots" content="noindex">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Malgun Gothic', sans-serif;
            min-height: 100vh;
            display: flex; align-items: center; justify-content: center;
            background: linear-gradient(135deg, #ffa502 0%, #ff6348 100%);
            color: #fff;
            padding: 24px;
        }
        .card {
            background: rgba(255,255,255,0.95);
            color: #333;
            border-radius: 20px;
            padding: 40px 32px;
            max-width: 460px;
            width: 100%;
            text-align: center;
            box-shadow: 0 20px 50px rgba(0,0,0,0.18);
        }
        .emoji { font-size: 56px; line-height: 1; margin-bottom: 14px; }
        h1 { font-size: 22px; color: #222; margin-bottom: 8px; }
        h2 { font-size: 14px; color: #888; font-weight: 500; margin-bottom: 24px; letter-spacing: 0.5px; }
        p { font-size: 14px; color: #555; line-height: 1.7; margin-bottom: 18px; }
        .btn {
            display: inline-block;
            background: #3c1e1e;
            color: white;
            padding: 12px 24px;
            border-radius: 24px;
            text-decoration: none;
            font-weight: 700;
            font-size: 14px;
            margin-top: 6px;
        }
        .btn:hover { transform: translateY(-2px); }
        .meta {
            margin-top: 18px;
            font-size: 12px;
            color: #999;
            line-height: 1.6;
        }
        .meta code { background: #f0f0f0; padding: 2px 6px; border-radius: 4px; font-size: 11px; }
        .footer {
            margin-top: 24px;
            font-size: 11px;
            color: #aaa;
        }
        .footer a { color: #aaa; }
    </style>
</head>
<body>
    <div class="card">
        <div class="emoji" aria-hidden="true">⚠️</div>
        <h1>잠시 문제가 생겼어요</h1>
        <h2>500 · Internal server error</h2>
        <p>
            서버에서 예상치 못한 오류가 발생했어요.<br>
            잠시 후 다시 시도해주세요. 문제가 계속되면 알려주세요.
        </p>
        <a class="btn" href="/chat">홈으로 돌아가기</a>
        <div class="meta">
            오류 ID: <code>{{ error_id or 'unknown' }}</code><br>
            문의: <a href="mailto:fassionmap@gmail.com">fassionmap@gmail.com</a>
        </div>
        <div class="footer">
            <a href="/privacy">개인정보처리방침</a> · <a href="/terms">이용약관</a>
        </div>
    </div>
</body>
</html>
