<svg xmlns="http://www.w3.org/2000/svg" width="160" height="160" viewBox="0 0 160 160">
  <!-- Background -->
  <rect width="160" height="160" rx="28" fill="#FFF8F0"/>
  <!-- Border -->
  <rect x="3" y="3" width="154" height="154" rx="25" fill="none" stroke="#D4A574" stroke-width="2.5" opacity="0.7"/>
  <!-- Decoration 1 -->
  <text x="120" y="20" text-anchor="middle" font-size="20" font-family="Apple Color Emoji, Segoe UI Emoji, Noto Color Emoji, sans-serif" opacity="0.85">✨</text>
  <!-- Main emoji -->
  <text x="80" y="100" text-anchor="middle" dominant-baseline="middle" font-size="76" font-family="Apple Color Emoji, Segoe UI Emoji, Noto Color Emoji, sans-serif">☕</text>
  <!-- Decoration 2 -->
  <text x="18" y="128" text-anchor="middle" font-size="18" font-family="Apple Color Emoji, Segoe UI Emoji, Noto Color Emoji, sans-serif" opacity="0.85">🧁</text>
</svg>