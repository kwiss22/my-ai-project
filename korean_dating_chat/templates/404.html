<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>페이지를 찾을 수 없어요 · K-Dating Chat</title>
    <meta name="robots" content="noindex">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Malgun Gothic', sans-serif;
            min-height: 100vh;
            display: flex; align-items: center; justify-content: center;
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: #fff;
            padding: 24px;
        }
        .card {
            background: rgba(255,255,255,0.95);
            color: #333;
            border-radius: 20px;
            padding: 40px 32px;
            max-width: 420px;
            width: 100%;
            text-align: center;
            box-shadow: 0 20px 50px rgba(0,0,0,0.18);
        }
        .emoji { font-size: 56px; line-height: 1; margin-bottom: 14px; }
        h1 { font-size: 22px; color: #222; margin-bottom: 8px; }
        h2 { font-size: 14px; color: #888; font-weight: 500; margin-bottom: 24px; letter-spacing: 0.5px; }
        p { font-size: 14px; color: #555; line-height: 1.7; margin-bottom: 24px; }
        .btn {
            display: inline-block;
            background: #3c1e1e;
            color: white;
            padding: 12px 24px;
            border-radius: 24px;
            text-decoration: none;
            font-weight: 700;
            font-size: 14px;
            transition: transform 0.2s;
        }
        .btn:hover { transform: translateY(-2px); }
        .footer {
            margin-top: 24px;
            font-size: 11px;
            color: #aaa;
        }
        .footer a { color: #aaa; }
    </style>
</head>
<body>
    <div class="card">
        <div class="emoji" aria-hidden="true">🔎</div>
        <h1>페이지를 찾을 수 없어요</h1>
        <h2>404 · Page not found</h2>
        <p>
            요청하신 페이지가 없거나 이동했어요.<br>
            홈으로 돌아가 캐릭터와 대화를 이어가요.
        </p>
        <a class="btn" href="/chat">홈으로 돌아가기</a>
        <div class="footer">
            <a href="/privacy">개인정보처리방침</a> · <a href="/terms">이용약관</a>
        </div>
    </div>
</body>
</html>
