name: CI

# 회귀 테스트 — PR 검증 + main 푸시 검증.
# tests/run.sh 한 줄이 33개 핵심 flow + 12개 export flow 검증.
#
# 외부 키 없이 동작. dev_placeholder + 더미 webhook secret 으로 시뮬레이션.

on:
  pull_request:
  push:
    branches: [main, 'claude/**']

jobs:
  regression:
    name: Regression suite
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: korean_dating_chat/requirements.txt

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r korean_dating_chat/requirements.txt

      - name: Smoke check — modules import
        working-directory: korean_dating_chat
        env:
          GEMINI_API_KEY: dev_placeholder
        run: |
          python3 -c "import chatbot; print('OK', len(chatbot.VALID_CHARACTERS), 'characters')"

      - name: Run regression suite
        working-directory: korean_dating_chat
        run: bash tests/run.sh

      - name: Upload server log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: regression-server-log
          path: /tmp/regression-server.log
          if-no-files-found: ignore
          retention-days: 7
